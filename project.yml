name: Playa
options:
  bundleIdPrefix: app
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: F8LA8PC4U6
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "17"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  Playa:
    type: application
    platform: iOS
    sources:
      - path: Playa
    resources:
      - path: Playa/Assets.xcassets
      - path: Playa/PrivacyInfo.xcprivacy
      - path: Playa/Resources/Fonts
        optional: true
        buildPhase: resources
    info:
      path: Playa/Info.plist
      properties:
        CFBundleDisplayName: Playa
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDevelopmentRegion: en
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIUserInterfaceStyle: Dark
        UIAppFonts:
          - Unbounded-Light.ttf
          - Unbounded-Regular.ttf
          - Unbounded-Medium.ttf
          - Unbounded-SemiBold.ttf
          - Unbounded-Bold.ttf
          - Unbounded-Black.ttf
          - SpaceGrotesk-Light.ttf
          - SpaceGrotesk-Regular.ttf
          - SpaceGrotesk-Medium.ttf
          - SpaceGrotesk-SemiBold.ttf
          - SpaceGrotesk-Bold.ttf
          - JetBrainsMono-Regular.ttf
          - JetBrainsMono-Medium.ttf
          - JetBrainsMono-SemiBold.ttf
          - JetBrainsMono-Bold.ttf
          - InstrumentSerif-Italic.ttf
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.social-networking
        CFBundleURLTypes:
          - CFBundleURLName: playa.auth
            CFBundleURLSchemes:
              - playa
        NSCameraUsageDescription: Playa uses the camera to scan event ticket QR codes at venues.
        NSPhotoLibraryUsageDescription: Playa uses your photo library so you can pick an avatar and event cover images.
    entitlements:
      path: Playa/Playa.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.playahub
        PRODUCT_NAME: Playa
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UILaunchScreen_Generation: NO
        ENABLE_BITCODE: NO
        SWIFT_OBJC_BRIDGING_HEADER: ""

  PlayaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PlayaTests
    dependencies:
      - target: Playa
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.playahub.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Playa:
    build:
      targets:
        Playa: all
    test:
      targets:
        - PlayaTests
      gatherCoverageData: false
